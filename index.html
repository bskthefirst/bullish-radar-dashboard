<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bullish Radar — Daily Signals Dashboard</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06080f;
  --card: #0d1117;
  --border: #1a2540;
  --green: #26de81;
  --red: #ff4560;
  --gold: #f5a623;
  --text-1: #fff;
  --text-2: #e0e6f0;
  --text-3: #8899aa;
  --text-4: #607080;
  --radius: 12px;
  --radius-sm: 6px;
  --pad: 24px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --sidebar-w: 320px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-2);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}
#app:has(.loading), #app:has(.no-data) {
  grid-template-columns: 1fr;
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: var(--pad);
  border-right: 1px solid var(--border);
  background: var(--card);
  display: flex;
  flex-direction: column;
  gap: 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.main {
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 32px;
  overflow-x: hidden;
}

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--pad);
}

/* ── Typography ── */
.mono { font-family: var(--mono); }
.section-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-3);
  margin-bottom: 14px;
}

/* ── Language Toggle ── */
.lang-toggle {
  align-self: flex-start;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 14px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  font-family: var(--font);
}
.lang-toggle:hover {
  border-color: var(--gold);
  color: var(--gold);
}

/* ── Logo ── */
.logo-block { text-align: center; padding: 8px 0 4px; }
.logo-text {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 3px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(245,166,35,0.3);
}
.logo-sub {
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── Scanner Stats ── */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 13px; color: var(--text-3); }
.stat-value { font-family: var(--mono); font-size: 14px; color: var(--text-1); font-weight: 600; }

/* ── Performance Summary ── */
.perf-hero {
  text-align: center;
  padding: 16px 0;
}
.perf-hero-value {
  font-family: var(--mono);
  font-size: 48px;
  font-weight: 800;
  color: var(--green);
  text-shadow: 0 0 30px rgba(38,222,129,0.3);
  line-height: 1;
}
.perf-hero-label {
  font-size: 12px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}
.perf-sub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 12px;
}
.perf-sub-item { text-align: center; }
.perf-sub-value {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-1);
}
.perf-sub-label {
  font-size: 11px;
  color: var(--text-4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── Market Prices ── */
.market-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.market-tile {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
  min-width: 0;
}
.market-ticker {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.market-price {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 700;
  color: var(--text-1);
  margin: 4px 0 2px;
}
.market-change {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
}
.clr-green { color: var(--green); }
.clr-red { color: var(--red); }
.clr-gold { color: var(--gold); }

/* ── Pick History ── */
.history-group { margin-bottom: 10px; }
.history-date {
  font-size: 11px;
  color: var(--text-4);
  margin-bottom: 6px;
}
.history-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.history-pill {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: 0.5px;
}
.pill-5 { background: rgba(245,166,35,0.2); color: var(--gold); }
.pill-4 { background: rgba(38,222,129,0.15); color: var(--green); }
.pill-3 { background: rgba(136,153,170,0.15); color: var(--text-3); }
.pill-2 { background: rgba(96,112,128,0.15); color: var(--text-4); }
.pill-1 { background: rgba(255,69,96,0.15); color: var(--red); }

/* ── News ── */
.news-row { display: flex; flex-direction: column; gap: 14px; }
.news-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  border-left: 4px solid var(--text-3);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.news-card.tag-bullish { border-left-color: var(--green); }
.news-card.tag-bearish { border-left-color: var(--red); }
.news-card.tag-neutral { border-left-color: var(--text-3); }
.news-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 4px;
  width: fit-content;
}
.news-tag.bullish { background: rgba(38,222,129,0.15); color: var(--green); }
.news-tag.bearish { background: rgba(255,69,96,0.15); color: var(--red); }
.news-tag.neutral { background: rgba(136,153,170,0.15); color: var(--text-3); }
.news-headline {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
  line-height: 1.3;
}
.news-summary { font-size: 13px; color: var(--text-3); line-height: 1.5; }
.news-insights { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.news-insights li {
  font-size: 12px;
  color: var(--text-2);
  padding-left: 14px;
  position: relative;
}
.news-insights li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 7px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text-4);
}
.news-source {
  font-size: 11px;
  color: var(--text-4);
  margin-top: auto;
}
.news-source a { color: var(--text-3); text-decoration: none; }
.news-source a:hover { text-decoration: underline; }

/* ── Watchlist ── */
.wl-sector-group { margin-bottom: 14px; }
.wl-sector-group:last-child { margin-bottom: 0; }
.wl-sector-name {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-4);
  margin-bottom: 8px;
}
.wl-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.wl-pill {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 12px;
  letter-spacing: 0.5px;
  transition: background 0.2s;
}
.wl-pill-picked {
  background: rgba(38,222,129,0.2);
  color: var(--green);
  border: 1px solid rgba(38,222,129,0.3);
}
.wl-pill-normal {
  background: rgba(136,153,170,0.1);
  color: var(--text-4);
  border: 1px solid var(--border);
}
.wl-pill-news {
  background: rgba(245,166,35,0.2);
  color: #f5a623;
  border: 1px solid rgba(245,166,35,0.3);
}

/* ── Picks Radar Table ── */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.radar-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.radar-table th {
  text-align: left;
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-4);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.radar-table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  vertical-align: middle;
}
.radar-table tbody tr {
  cursor: pointer;
  transition: background 0.15s;
}
.radar-table tbody tr:hover { background: rgba(26,37,64,0.5); }
.radar-table tbody tr:last-child td { border-bottom: none; }
.td-ticker {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 14px;
  color: var(--text-1);
}
.news-tag { color: #f5a623; font-size: 12px; margin-left: 2px; }
.td-stars { color: var(--gold); letter-spacing: 1px; font-size: 14px; }
.td-mono { font-family: var(--mono); color: var(--text-2); }

/* Score bar */
.score-cell { display: flex; align-items: center; gap: 8px; }
.score-num { font-family: var(--mono); font-weight: 700; color: var(--text-1); min-width: 28px; }
.score-bar-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  min-width: 60px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--green), #47e89b);
  transition: width 0.6s ease;
}

.td-template {
  font-size: 12px;
  color: var(--text-3);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rr-badge {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 12px;
  padding: 2px 7px;
  border-radius: 4px;
}
.rr-good { background: rgba(38,222,129,0.15); color: var(--green); }
.rr-mid { background: rgba(245,166,35,0.15); color: var(--gold); }
.rr-bad { background: rgba(255,69,96,0.15); color: var(--red); }

.rs-badge {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 12px;
}

/* ── Signal Heatmap ── */
.heatmap-wrap {
  overflow-x: auto;
  padding-bottom: 8px;
}
.heatmap-table {
  border-collapse: collapse;
  font-size: 12px;
}
.heatmap-table th, .heatmap-table td {
  padding: 0;
  text-align: center;
}
.heatmap-group-header {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-4);
  padding: 4px 6px 8px !important;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.heatmap-signal-header {
  width: 28px;
  min-width: 28px;
  height: 90px;
  vertical-align: bottom;
  padding: 0 2px 6px !important;
  border-bottom: 1px solid var(--border);
}
.heatmap-signal-header span {
  display: block;
  transform: rotate(-45deg);
  transform-origin: left bottom;
  white-space: nowrap;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-4);
  letter-spacing: 0.3px;
  width: 28px;
}
.heatmap-ticker-cell {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 12px;
  color: var(--text-1);
  padding: 4px 12px 4px 0 !important;
  text-align: right;
  white-space: nowrap;
  border-right: 1px solid var(--border);
}
.heatmap-cell {
  width: 28px;
  min-width: 28px;
  height: 28px;
  padding: 2px !important;
}
.heatmap-dot {
  display: block;
  width: 22px;
  height: 22px;
  margin: 0 auto;
  border-radius: 4px;
  transition: background 0.2s;
}
.heatmap-dot.on { background: var(--green); box-shadow: 0 0 6px rgba(38,222,129,0.3); }
.heatmap-dot.off { background: var(--border); }

/* ── Pick Detail Cards ── */
.detail-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  overflow: hidden;
  transition: border-color 0.2s;
}
.detail-card:hover { border-color: #2a3a5a; }
.detail-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px var(--pad);
  cursor: pointer;
  user-select: none;
}
.detail-header:hover { background: rgba(26,37,64,0.3); }
.detail-chevron {
  font-size: 14px;
  color: var(--text-4);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.detail-card.expanded .detail-chevron { transform: rotate(90deg); }
.detail-header-ticker {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 800;
  color: var(--text-1);
}
.detail-header-stars { color: var(--gold); font-size: 14px; letter-spacing: 1px; }
.detail-header-score {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-3);
  margin-left: auto;
}
.detail-header-template {
  font-size: 12px;
  color: var(--text-4);
}
.detail-body-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.detail-card.expanded .detail-body-wrap { max-height: 2000px; }
.detail-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  padding: 0 var(--pad) var(--pad);
}
.detail-left, .detail-right { display: flex; flex-direction: column; gap: 16px; }

/* Chart image */
.chart-container {
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg);
  border: 1px solid var(--border);
  position: relative;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chart-container img {
  width: 100%;
  display: block;
}
.chart-fallback {
  color: var(--text-4);
  font-size: 13px;
  text-align: center;
  padding: 40px 20px;
}

/* Trade setup */
.trade-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.trade-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
.trade-table td {
  padding: 8px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-2);
  border-bottom: 1px solid var(--border);
}
.trade-table tr:last-child td { border-bottom: none; }
.trade-pct { font-size: 11px; color: var(--text-4); margin-left: 4px; }

/* Signal pills */
.signal-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.signal-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.signal-pill.active { background: rgba(38,222,129,0.15); color: var(--green); }
.signal-pill.inactive { background: rgba(26,37,64,0.4); color: var(--text-4); }

/* Risk metrics */
.risk-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.risk-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.risk-value {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
}
.risk-label {
  font-size: 10px;
  color: var(--text-4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* Fundamentals */
.fund-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.fund-list li {
  font-size: 13px;
  color: var(--text-2);
  padding-left: 14px;
  position: relative;
}
.fund-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 8px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
}

/* Volume profile */
.vol-profile { display: flex; gap: 16px; }
.vol-item { font-size: 12px; }
.vol-label { color: var(--text-4); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
.vol-value { font-family: var(--mono); font-weight: 700; color: var(--text-2); font-size: 14px; }

/* Detail caption */
.detail-caption {
  grid-column: 1 / -1;
  font-size: 13px;
  color: var(--text-3);
  font-style: italic;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ── Performance Tracker ── */
.perf-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.perf-table th {
  text-align: left;
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-4);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.perf-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-2);
}
.perf-table tbody tr:last-child td { border-bottom: none; }
.perf-summary-row td {
  font-weight: 700;
  color: var(--text-1) !important;
  border-top: 2px solid var(--border);
  background: rgba(26,37,64,0.2);
}
.check-mark { color: var(--green); }
.dash-mark { color: var(--text-4); }

/* ── Footer ── */
.dashboard-footer {
  text-align: center;
  padding: 32px var(--pad);
  border-top: 1px solid var(--border);
  color: var(--text-4);
  font-size: 12px;
  line-height: 1.8;
}
.footer-disclaimer {
  font-size: 11px;
  color: var(--text-4);
  max-width: 500px;
  margin: 0 auto 8px;
}
.footer-brand { color: var(--gold); font-weight: 600; }

/* ── Daily Summary ── */
.daily-summary {
    background: linear-gradient(135deg, rgba(245,166,35,0.08), rgba(38,222,129,0.05));
    border-color: var(--gold);
}

/* ── Loading ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  color: var(--text-3);
  font-size: 14px;
  gap: 10px;
}
.loading-spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── No Data ── */
.no-data {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  color: var(--text-3);
  font-size: 15px;
  text-align: center;
  padding: 40px;
}

/* ── Responsive ── */
@media (max-width: 1024px) {
  #app, #app[style] {
    grid-template-columns: 1fr !important;
  }
  .sidebar {
    position: relative;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .main { padding: 24px 16px; }
  .news-row { gap: 12px; }
}

@media (max-width: 768px) {
  #app, #app[style] {
    grid-template-columns: 1fr !important;
  }
  .sidebar {
    position: relative;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 20px 16px;
    gap: 18px;
  }
  .main { padding: 16px 12px; gap: 20px; }
  .news-row { grid-template-columns: 1fr; gap: 12px; }
  .news-card { padding: 16px; gap: 8px; }
  .news-headline { font-size: 15px; }
  .news-summary { font-size: 13px; }
  .news-insights li { font-size: 12px; }
  .table-wrap { border-radius: var(--radius-sm); }
  .radar-table th, .radar-table td { padding: 10px 10px; font-size: 13px; }
  .radar-hide-mobile { display: none; }
  .heatmap-wrap { -webkit-overflow-scrolling: touch; }
  .detail-body { grid-template-columns: 1fr; }
  .risk-grid { grid-template-columns: repeat(2, 1fr); }
  .market-grid { gap: 10px; }
  .perf-sub-grid { gap: 10px; }
  .section-title { font-size: 12px; }
  .card { padding: 18px 14px; }

  /* Watchlist */
  .wl-sector-group { margin-bottom: 16px; }
  .wl-pills { gap: 8px; }
  .wl-pill { font-size: 13px; padding: 6px 12px; border-radius: 16px; }

  /* Detail cards */
  .detail-header { padding: 14px 16px; gap: 10px; flex-wrap: wrap; }
  .detail-header-template { display: none; }
  .detail-body { padding: 0 16px 16px; gap: 16px; }

  /* Performance table */
  .perf-table th, .perf-table td { padding: 10px 8px; font-size: 12px; }
  .perf-hide-mobile { display: none; }

  /* Logo */
  .logo-text { font-size: 20px; }
  .perf-hero-value { font-size: 42px; }

  /* Market tiles readable */
  .market-price { font-size: 18px; }
  .market-change { font-size: 13px; }
  .market-ticker { font-size: 12px; }

  /* Daily summary */
  .daily-summary { padding: 16px !important; }

  /* Heatmap */
  .heatmap-cell { width: 26px; min-width: 26px; height: 26px; }
  .heatmap-dot { width: 20px; height: 20px; }
  .heatmap-signal-header { width: 26px; min-width: 26px; }
}

@media (max-width: 480px) {
  .sidebar { padding: 16px 14px; gap: 16px; }
  .main { padding: 14px 10px; gap: 18px; }
  .card { padding: 16px 12px; }

  /* Market tiles */
  .market-grid { gap: 8px; }
  .market-tile { padding: 10px 8px; }
  .market-price { font-size: 16px; }
  .market-change { font-size: 12px; }

  /* Radar table */
  .radar-table { font-size: 12px; }
  .radar-table th, .radar-table td { padding: 8px 8px; }

  /* Heatmap scroll */
  .heatmap-cell { width: 24px; min-width: 24px; height: 24px; }
  .heatmap-dot { width: 18px; height: 18px; }
  .heatmap-signal-header { width: 24px; min-width: 24px; }
  .heatmap-signal-header span { width: 24px; font-size: 9px; }

  /* Detail cards */
  .detail-header { padding: 12px 14px; }
  .detail-header-ticker { font-size: 16px; }
  .detail-body { gap: 14px; padding: 0 14px 14px; }

  /* Risk grid stays 2-col */
  .risk-grid { grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Watchlist pills */
  .wl-pill { font-size: 12px; padding: 5px 10px; }

  /* Perf table */
  .perf-table th, .perf-table td { padding: 8px 6px; font-size: 11px; }

  .section-title { font-size: 11px; margin-bottom: 10px; }
  .logo-text { font-size: 18px; letter-spacing: 2px; }
  .logo-sub { font-size: 10px; }
  .perf-hero-value { font-size: 36px; }

  /* News */
  .news-card { padding: 14px; }
  .news-headline { font-size: 14px; }
  .news-summary { font-size: 12px; }
  .news-source { font-size: 10px; }

  /* Footer */
  .dashboard-footer { padding: 20px 12px; font-size: 11px; }
  .footer-disclaimer { font-size: 10px; }
}

      volume_profile: '\uAC70\uB798\uB7C9 \uD504\uB85C\uD544',
      key_stats: '\uD575\uC2EC \uC9C0\uD45C',
      analysis: '\uBD84\uC11D',

      price: '\uAC00\uACA9',

      stop: '\uC190\uC808\uAC00',

      rr: '\uC704\uD5D8:\uBCF4\uC0C1',
      ticker: '\uC885\uBAA9',
      stars_col: '\uB4F1\uAE09',

      template: '\uD15C\uD50C\uB9BF',
      rs_vs_spy: 'RS vs SPY',
      current: '\uD604\uC7AC\uAC00',
      pct_change: '\uBCC0\uB3D9\uB960',
      days_held: '\uBCF4\uC720\uC77C',
      target_hit: '\uBAA9\uD45C \uB3C4\uB2EC',
      stop_hit: '\uC190\uC808 \uB3C4\uB2EC',
      total: '\uD569\uACC4',
      avg: '\uD3C9\uADE0',
      no_chart: '\uCC28\uD2B8 \uC5C6\uC74C',
      chart_na: '\uCC28\uD2B8 \uC5C6\uC74C:',
      no_data: '\uB300\uC2DC\uBCF4\uB4DC \uB370\uC774\uD130\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4. \uC2A4\uCE90\uB108\uB97C \uBA3C\uC800 \uC2E4\uD589\uD558\uC138\uC694.',
      loading: '\uB300\uC2DC\uBCF4\uB4DC \uB85C\uB529 \uC911...',
      disclaimer: '\uC774 \uC790\uB8CC\uB294 \uD22C\uC790 \uC870\uC5B8\uC774 \uC544\uB2D9\uB2C8\uB2E4. \uAD50\uC721 \uBC0F \uC815\uBCF4 \uC81C\uACF5 \uBAA9\uC801\uC73C\uB85C\uB9CC \uC0AC\uC6A9\uB429\uB2C8\uB2E4.',
      powered_by: 'Powered by',
      last_updated: '\uCD5C\uC885 \uC5C5\uB370\uC774\uD2B8',
      no_perf_data: '\uC544\uC9C1 \uC2E4\uC801 \uB370\uC774\uD130\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4',
      read: '\uC77D\uAE30'
    }
  };

  var lang = localStorage.getItem('lang') || 'en';
  var cachedData = null;

  function t(key) {
    return (T[lang] && T[lang][key]) || (T.en[key]) || key;
  }

  /* ── Helpers ── */
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function fmt(n, d) {
    if (d === undefined) d = 2;
    return Number(n).toFixed(d);
  }

  function pctClass(v, invert) {
    if (invert) return v > 0 ? 'clr-red' : v < 0 ? 'clr-green' : '';
    return v > 0 ? 'clr-green' : v < 0 ? 'clr-red' : '';
  }

  function pctSign(v) {
    return (v > 0 ? '+' : '') + fmt(v) + '%';
  }

  function stars(n) {
    var s = '';
    for (var i = 0; i < 5; i++) s += i < n ? '\u2605' : '\u2606';
    return s;
  }

  function pillClass(s) {
    if (s >= 5) return 'pill-5';
    if (s >= 4) return 'pill-4';
    if (s >= 3) return 'pill-3';
    if (s >= 2) return 'pill-2';
    return 'pill-1';
  }

  function rrClass(v) {
    if (v >= 3) return 'rr-good';
    if (v >= 2) return 'rr-mid';
    return 'rr-bad';
  }

  function translateFundPart(text) {
    if (lang !== 'ko') return text;
    return text
        .replace(/earnings growing/i, '이익 성장률')
        .replace(/earnings declining/i, '이익 감소')
        .replace(/Revenue growing/i, '매출 성장률')
        .replace(/Op margin/i, '영업이익률')
        .replace(/Net margin/i, '순이익률')
        .replace(/Current ratio/i, '유동비율')
        .replace(/Consensus: Strong Buy/i, '컨센서스: 적극 매수')
        .replace(/Consensus: Buy/i, '컨센서스: 매수')
        .replace(/Consensus: Hold/i, '컨센서스: 보유')
        .replace(/Analyst upside/i, '애널리스트 목표 상승률')
        .replace(/Institutional/i, '기관 보유율')
        .replace(/Insider/i, '내부자 보유율')
        .replace(/FCF positive/i, '잉여현금흐름 양호')
        .replace(/OCF positive/i, '영업현금흐름 양호')
        .replace(/vs sector median/i, 'vs 섹터 중간값');
  }

  /* ── Signal grouping ── */
  function collectSignals(picks) {
    var seen = {};
    (picks || []).forEach(function(p) {
      if (p.signals) Object.keys(p.signals).forEach(function(k) { seen[k] = true; });
    });
    return Object.keys(seen);
  }

  /* ── Render Sidebar ── */
  function renderSidebar(data) {
    var sb = el('aside', 'sidebar');

    /* Language toggle */
    var langBtn = el('button', 'lang-toggle', lang === 'en' ? '\uD55C\uAE00' : 'EN');
    langBtn.addEventListener('click', function() {
      lang = lang === 'en' ? 'ko' : 'en';
      localStorage.setItem('lang', lang);
      renderDashboard(cachedData);
    });
    sb.appendChild(langBtn);

    /* Logo */
    var logo = el('div', 'logo-block');
    logo.innerHTML = '<div class="logo-text">' + t('title') + '</div><div class="logo-sub">' + t('subtitle') + '</div>';
    sb.appendChild(logo);

    /* Scanner Stats */
    var meta = data.meta;
    var ssec = el('div');
    ssec.appendChild(el('div', 'section-title', t('scanner_stats')));
    var rows = [
      [t('date'), meta.date],
      [t('tickers_scanned'), meta.total_scanned],
      [t('picks_found'), meta.picks_found]
    ];
    rows.forEach(function(r) {
      var row = el('div', 'stat-row');
      row.innerHTML = '<span class="stat-label">' + r[0] + '</span><span class="stat-value">' + r[1] + '</span>';
      ssec.appendChild(row);
    });
    sb.appendChild(ssec);

    /* Performance Summary */
    var perf = data.performance && data.performance.summary;
    if (perf && perf.win_rate !== undefined) {
      var psec = el('div');
      psec.appendChild(el('div', 'section-title', t('performance')));
      var hero = el('div', 'perf-hero');
      hero.innerHTML = '<div class="perf-hero-value">' + fmt(perf.win_rate, 0) + '%</div><div class="perf-hero-label">' + t('win_rate') + '</div>';
      psec.appendChild(hero);
      var sub = el('div', 'perf-sub-grid');
      sub.innerHTML =
        '<div class="perf-sub-item"><div class="perf-sub-value">' + pctSign(perf.avg_return) + '</div><div class="perf-sub-label">' + t('avg_return') + '</div></div>' +
        '<div class="perf-sub-item"><div class="perf-sub-value">' + fmt(perf.target_hit_rate, 0) + '%</div><div class="perf-sub-label">' + t('target_hit_rate') + '</div></div>';
      psec.appendChild(sub);
      sb.appendChild(psec);
    }

    /* Market Prices */
    var mkt = data.market;
    if (mkt) {
      var msec = el('div');
      msec.appendChild(el('div', 'section-title', t('market_pulse')));
      var grid = el('div', 'market-grid');
      ['spy','qqq','iwm','vix'].forEach(function(k) {
        var d = mkt[k];
        if (!d) return;
        var isVix = k === 'vix';
        var tile = el('div', 'market-tile');
        tile.innerHTML =
          '<div class="market-ticker">' + k.toUpperCase() + '</div>' +
          '<div class="market-price mono">' + fmt(d.price) + '</div>' +
          '<div class="market-change ' + pctClass(d.change_pct, isVix) + '">' + pctSign(d.change_pct) + '</div>';
        grid.appendChild(tile);
      });
      msec.appendChild(grid);
      sb.appendChild(msec);
    }

    /* Pick History */
    var hist = data.pick_history;
    if (hist && hist.length) {
      var hsec = el('div');
      hsec.appendChild(el('div', 'section-title', t('pick_tracker')));
      hist.forEach(function(day) {
        var grp = el('div', 'history-group');
        grp.innerHTML = '<div class="history-date">' + day.date + '</div>';
        var pills = el('div', 'history-pills');
        (day.picks || []).forEach(function(p) {
          var pill = el('span', 'history-pill ' + pillClass(p.stars), p.ticker);
          pills.appendChild(pill);
        });
        grp.appendChild(pills);
        hsec.appendChild(grp);
      });
      sb.appendChild(hsec);
    }

    return sb;
  }

  /* ── Render News ── */
  function renderNews(news) {
    var sec = el('section');
    sec.appendChild(el('div', 'section-title', t('market_news')));
    var row = el('div', 'news-row');
    (news || []).forEach(function(item) {
      var tag = (item.tag || 'neutral').toLowerCase();
      var tagLabel = tag;
      if (lang === 'ko') {
          if (tag === 'bullish') tagLabel = '상승';
          else if (tag === 'bearish') tagLabel = '하락';
          else if (tag === 'neutral') tagLabel = '중립';
      }
      var card = el('div', 'news-card tag-' + tag);
      var tagPill = '<span class="news-tag ' + tag + '">' + tagLabel + '</span>';
      var insights = '';
      var insightsList = (lang === 'ko' && item.insights_ko && item.insights_ko.length) ? item.insights_ko : (item.insights || []);
      if (insightsList.length) {
        insights = '<ul class="news-insights">' + insightsList.map(function(i) { return '<li>' + i + '</li>'; }).join('') + '</ul>';
      }
      var src = item.source ? '<div class="news-source">' + item.source + (item.url ? ' &middot; <a href="' + item.url + '" target="_blank" rel="noopener">' + t('read') + '</a>' : '') + '</div>' : '';
      var headlineText = (lang === 'ko' && item.headline_ko) ? item.headline_ko : (item.headline || item.title || '');
      var summaryText = (lang === 'ko' && item.summary_ko) ? item.summary_ko : (item.summary || item.body || '');
      card.innerHTML = tagPill + '<div class="news-headline">' + headlineText + '</div><div class="news-summary">' + summaryText + '</div>' + insights + src;
      row.appendChild(card);
    });
    sec.appendChild(row);
    return sec;
  }

  /* ── Render Watchlist ── */
  function renderWatchlist(watchlist) {
    if (!watchlist || !Object.keys(watchlist).length) return el('div');
    var sec = el('section');
    sec.appendChild(el('div', 'section-title', t('watchlist')));
    var card = el('div', 'card');

    Object.keys(watchlist).forEach(function(sector) {
      var group = el('div', 'wl-sector-group');
      group.appendChild(el('div', 'wl-sector-name', sector));
      var pills = el('div', 'wl-pills');
      watchlist[sector].forEach(function(item) {
        var isPicked = item.picked;
        var isNews = item.news_driven;
        var cls = 'wl-pill ' + (isPicked ? 'wl-pill-picked' : isNews ? 'wl-pill-news' : 'wl-pill-normal');
        var prefix = isPicked ? '\u2605 ' : isNews ? '\u26A1 ' : '';
        var pill = el('span', cls, prefix + item.ticker);
        if (isNews) pill.title = lang === 'ko' ? '뉴스 기반 발굴' : 'News-driven discovery';
        pills.appendChild(pill);
      });
      group.appendChild(pills);
      card.appendChild(group);
    });

    sec.appendChild(card);
    return sec;
  }

  /* ── Render Radar Table ── */
  function renderRadarTable(picks) {
    var sec = el('section');
    sec.appendChild(el('div', 'section-title', t('top_picks')));
    var wrap = el('div', 'table-wrap');
    var table = el('table', 'radar-table');
    table.innerHTML = '<thead><tr>' +
      '<th>#</th><th>' + t('ticker') + '</th><th>' + t('stars_col') + '</th><th>' + t('score') + '</th><th class="radar-hide-mobile">' + t('template') + '</th>' +
      '<th>' + t('entry') + '</th><th>' + t('target_1') + '</th><th>' + t('stop') + '</th><th>' + t('rr') + '</th><th class="radar-hide-mobile">' + t('rs_vs_spy') + '</th>' +
      '</tr></thead>';
    var tbody = el('tbody');
    (picks || []).forEach(function(p) {
      var tr = el('tr');
      tr.setAttribute('data-detail', p.ticker);
      tr.addEventListener('click', function() {
        var target = document.getElementById('detail-' + p.ticker);
        if (target) {
          target.classList.add('expanded');
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
      var rr = p.trade ? p.trade.rr : 0;
      var rs = p.relative_strength || 0;
      var scoreVal = p.score || 0;
      var newsTag = p.news_driven ? ' <span class="news-tag" title="News-driven discovery">\u26A1</span>' : '';
      tr.innerHTML =
        '<td class="td-mono">' + (p.rank || '') + '</td>' +
        '<td class="td-ticker">' + p.ticker + newsTag + '</td>' +
        '<td class="td-stars">' + stars(p.stars) + '</td>' +
        '<td><div class="score-cell"><span class="score-num">' + scoreVal + '</span><div class="score-bar-track"><div class="score-bar-fill" style="width:' + scoreVal + '%"></div></div></div></td>' +
        '<td class="td-template radar-hide-mobile">' + (p.template || '') + '</td>' +
        '<td class="td-mono">' + (p.trade ? fmt(p.trade.entry) : fmt(p.price)) + '</td>' +
        '<td class="td-mono">' + (p.trade ? fmt(p.trade.target1) : '-') + '</td>' +
        '<td class="td-mono">' + (p.trade ? fmt(p.trade.stop) : '-') + '</td>' +
        '<td><span class="rr-badge ' + rrClass(rr) + '">' + fmt(rr, 1) + '</span></td>' +
        '<td class="rs-badge radar-hide-mobile ' + (rs >= 0 ? 'clr-green' : 'clr-red') + '">' + (rs >= 0 ? '+' : '') + fmt(rs, 1) + '</td>';
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    sec.appendChild(wrap);
    return sec;
  }

  /* ── Render Heatmap ── */
  function renderHeatmap(picks) {
    var allSignals = collectSignals(picks);
    if (!allSignals.length) return el('div');

    var sec = el('section');
    sec.appendChild(el('div', 'section-title', t('signal_heatmap')));
    var wrap = el('div', 'heatmap-wrap card');
    var table = el('table', 'heatmap-table');

    /* Signal header row */
    var shRow = el('tr');
    shRow.innerHTML = '<th></th>';
    allSignals.forEach(function(s) {
      shRow.innerHTML += '<th class="heatmap-signal-header"><span>' + s + '</span></th>';
    });

    var thead = el('thead');
    thead.appendChild(shRow);
    table.appendChild(thead);

    var tbody = el('tbody');
    (picks || []).forEach(function(p) {
      var tr = el('tr');
      tr.innerHTML = '<td class="heatmap-ticker-cell">' + p.ticker + '</td>';
      allSignals.forEach(function(s) {
        var on = p.signals && p.signals[s];
        tr.innerHTML += '<td class="heatmap-cell"><span class="heatmap-dot ' + (on ? 'on' : 'off') + '"></span></td>';
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    sec.appendChild(wrap);
    return sec;
  }

  /* ── Render Detail Cards ── */
  function renderDetailCards(picks) {
    var sec = el('section');
    sec.appendChild(el('div', 'section-title', t('pick_details')));

    (picks || []).forEach(function(p) {
      var card = el('div', 'detail-card');
      card.id = 'detail-' + p.ticker;

      /* Header */
      var hdr = el('div', 'detail-header');
      hdr.innerHTML =
        '<span class="detail-chevron">&#9654;</span>' +
        '<span class="detail-header-ticker">' + p.ticker + '</span>' +
        '<span class="detail-header-stars">' + stars(p.stars) + '</span>' +
        '<span class="detail-header-template">' + (p.template || '') + '</span>' +
        '<span class="detail-header-score">' + t('score') + ': ' + (p.score || 0) + '</span>';
      hdr.addEventListener('click', function() { card.classList.toggle('expanded'); });
      card.appendChild(hdr);

      /* Body wrap */
      var bwrap = el('div', 'detail-body-wrap');
      var body = el('div', 'detail-body');

      /* Left column */
      var left = el('div', 'detail-left');

      /* Chart */
      var chartCont = el('div', 'chart-container');
      if (p.chart_file) {
        var img = document.createElement('img');
        img.src = p.chart_file;
        img.alt = p.ticker + ' chart';
        img.loading = 'lazy';
        img.onerror = function() {
          this.style.display = 'none';
          var fb = el('div', 'chart-fallback', t('chart_na') + ' ' + p.ticker);
          chartCont.appendChild(fb);
        };
        chartCont.appendChild(img);
      } else {
        chartCont.appendChild(el('div', 'chart-fallback', t('no_chart')));
      }
      left.appendChild(chartCont);

      /* Analysis */
      if (p.analysis) {
        var analysisText = lang === 'ko' && p.analysis_ko ? p.analysis_ko : p.analysis;
        var aDv = el('div');
        aDv.innerHTML = '<div class="section-title" style="margin-top:8px">' + t('analysis') + '</div><p style="font-size:13px;color:var(--text-3);line-height:1.6">' + analysisText + '</p>';
        left.appendChild(aDv);
      }

      body.appendChild(left);

      /* Right column */
      var right = el('div', 'detail-right');

      /* Trade setup */
      if (p.trade) {
        var trd = p.trade;
        var tsec = el('div');
        tsec.innerHTML = '<div class="section-title">' + t('trade_setup') + '</div>';
        var tt = el('table', 'trade-table');
        tt.innerHTML =
          '<tr><th>' + t('level') + '</th><th>' + t('price') + '</th><th></th></tr>' +
          '<tr><td>' + t('entry') + '</td><td>' + fmt(trd.entry) + '</td><td></td></tr>' +
          '<tr><td>' + t('stop') + '</td><td class="clr-red">' + fmt(trd.stop) + '</td><td class="trade-pct">' + (trd.risk_pct ? '-' + fmt(trd.risk_pct) + '% (' + (trd.stop_method || '') + ')' : '') + '</td></tr>' +
          '<tr><td>' + t('target_1') + '</td><td class="clr-green">' + fmt(trd.target1) + '</td><td class="trade-pct">' + (trd.target1_pct ? '+' + fmt(trd.target1_pct) + '%' : '') + '</td></tr>' +
          '<tr><td>' + t('target_2') + '</td><td class="clr-green">' + fmt(trd.target2) + '</td><td class="trade-pct">' + (trd.target2_pct ? '+' + fmt(trd.target2_pct) + '%' : '') + '</td></tr>' +
          '<tr><td>' + t('rr') + '</td><td colspan="2"><span class="rr-badge ' + rrClass(trd.rr) + '">' + fmt(trd.rr, 1) + '</span></td></tr>';
        tsec.appendChild(tt);
        right.appendChild(tsec);
      }

      /* Signal pills */
      if (p.signals) {
        var ssec = el('div');
        ssec.innerHTML = '<div class="section-title">' + t('signals') + '</div>';
        var pills = el('div', 'signal-pills');
        Object.keys(p.signals).forEach(function(k) {
          pills.appendChild(el('span', 'signal-pill ' + (p.signals[k] ? 'active' : 'inactive'), k));
        });
        ssec.appendChild(pills);
        right.appendChild(ssec);
      }

      /* Risk metrics */
      if (p.risk_metrics) {
        var rm = p.risk_metrics;
        var rsec = el('div');
        rsec.innerHTML = '<div class="section-title">' + t('risk_metrics') + '</div>';
        var rg = el('div', 'risk-grid');
        var metrics = [
          ['Max DD', fmt(rm.max_drawdown, 1) + '%'],
          ['Volatility', fmt(rm.ann_volatility || rm.volatility_pct || 0, 1) + '%'],
          ['Sharpe', fmt(rm.sharpe_ratio)],
          ['Beta', fmt(rm.beta)]
        ];
        metrics.forEach(function(m) {
          rg.innerHTML += '<div class="risk-item"><div class="risk-value">' + m[1] + '</div><div class="risk-label">' + m[0] + '</div></div>';
        });
        rsec.appendChild(rg);
        right.appendChild(rsec);
      }

      /* Fundamentals */
      if (p.fund_analysis_parts && p.fund_analysis_parts.length) {
        var fsec = el('div');
        fsec.innerHTML = '<div class="section-title">' + t('fundamentals') + '</div>';
        var fl = el('ul', 'fund-list');
        p.fund_analysis_parts.forEach(function(f) { fl.innerHTML += '<li>' + translateFundPart(f) + '</li>'; });
        fsec.appendChild(fl);
        right.appendChild(fsec);
      }

      /* Volume profile */
      if (p.volume_profile) {
        var vp = p.volume_profile;
        var vsec = el('div');
        vsec.innerHTML = '<div class="section-title">' + t('volume_profile') + '</div>';
        var vd = el('div', 'vol-profile');
        vd.innerHTML =
          '<div class="vol-item"><div class="vol-label">POC</div><div class="vol-value">' + fmt(vp.poc) + '</div></div>' +
          '<div class="vol-item"><div class="vol-label">VAH</div><div class="vol-value">' + fmt(vp.vah) + '</div></div>' +
          '<div class="vol-item"><div class="vol-label">VAL</div><div class="vol-value">' + fmt(vp.val) + '</div></div>';
        vsec.appendChild(vd);
        right.appendChild(vsec);
      }

      /* Extra info (RSI, squeeze days, RS) */
      if (p.rsi || p.squeeze_days) {
        var extras = el('div');
        extras.innerHTML = '<div class="section-title">' + t('key_stats') + '</div>';
        var eg = el('div', 'risk-grid');
        var exItems = [];
        if (p.rsi !== undefined) exItems.push(['RSI', fmt(p.rsi, 1)]);
        if (p.squeeze_days !== undefined) exItems.push(['Squeeze', p.squeeze_days + 'd']);
        if (p.relative_strength !== undefined) exItems.push(['RS', (p.relative_strength >= 0 ? '+' : '') + fmt(p.relative_strength, 1)]);
        exItems.forEach(function(m) {
          eg.innerHTML += '<div class="risk-item"><div class="risk-value">' + m[1] + '</div><div class="risk-label">' + m[0] + '</div></div>';
        });
        extras.appendChild(eg);
        right.appendChild(extras);
      }

      body.appendChild(right);

      /* Caption */
      if (p.caption) {
        body.innerHTML += '<div class="detail-caption">' + p.caption + '</div>';
      }

      bwrap.appendChild(body);
      card.appendChild(bwrap);
      sec.appendChild(card);
    });

    return sec;
  }

  /* ── Render Performance Tracker ── */
  function renderPerformance(performance) {
    if (!performance) return el('div');
    var picks = performance.picks || [];
    var summary = performance.summary || {};

    var sec = el('section');
    sec.appendChild(el('div', 'section-title', t('perf_tracker')));

    if (!picks.length) {
      var msg = el('div', 'card');
      msg.innerHTML = '<div style="text-align:center;color:var(--text-4);padding:20px 0">' + t('no_perf_data') + '</div>';
      sec.appendChild(msg);
      return sec;
    }

    var wrap = el('div', 'table-wrap');
    var table = el('table', 'perf-table');
    table.innerHTML = '<thead><tr>' +
      '<th>' + t('ticker') + '</th><th>' + t('stars_col') + '</th><th>' + t('entry') + '</th><th>' + t('current') + '</th><th>' + t('pct_change') + '</th>' +
      '<th>' + t('days_held') + '</th><th>' + t('target_hit') + '</th><th>' + t('stop_hit') + '</th>' +
      '</tr></thead>';
    var tbody = el('tbody');
    picks.forEach(function(p) {
      var tr = el('tr');
      var chg = p.pct_change || 0;
      tr.innerHTML =
        '<td class="td-ticker">' + p.ticker + '</td>' +
        '<td class="td-stars">' + stars(p.stars) + '</td>' +
        '<td class="td-mono">' + fmt(p.entry) + '</td>' +
        '<td class="td-mono">' + fmt(p.current) + '</td>' +
        '<td class="td-mono ' + pctClass(chg) + '">' + pctSign(chg) + '</td>' +
        '<td class="td-mono">' + (p.days_ago || '-') + '</td>' +
        '<td>' + (p.hit_target ? '<span class="check-mark">&#10003;</span>' : '<span class="dash-mark">&mdash;</span>') + '</td>' +
        '<td>' + (p.hit_stop ? '<span class="clr-red">&#10003;</span>' : '<span class="dash-mark">&mdash;</span>') + '</td>';
      tbody.appendChild(tr);
    });

    /* Summary row */
    var srow = el('tr', 'perf-summary-row');
    srow.innerHTML =
      '<td>' + t('total') + ': ' + (summary.total || picks.length) + '</td>' +
      '<td></td>' +
      '<td></td>' +
      '<td></td>' +
      '<td class="' + pctClass(summary.avg_return) + '">' + t('avg') + ' ' + pctSign(summary.avg_return || 0) + '</td>' +
      '<td></td>' +
      '<td>' + (summary.target_hits || 0) + ' / ' + (summary.total || picks.length) + '</td>' +
      '<td>' + (summary.winners || 0) + 'W / ' + ((summary.total || picks.length) - (summary.winners || 0)) + 'L</td>';
    tbody.appendChild(srow);

    table.appendChild(tbody);
    wrap.appendChild(table);
    sec.appendChild(wrap);
    return sec;
  }

  /* ── Render Footer ── */
  function renderFooter(meta) {
    var footer = el('footer', 'dashboard-footer');
    var ts = meta && meta.timestamp ? new Date(meta.timestamp).toLocaleString() : '';
    footer.innerHTML =
      '<div class="footer-disclaimer">' + t('disclaimer') + '</div>' +
      (ts ? '<div style="margin-bottom:4px">' + t('last_updated') + ': ' + ts + '</div>' : '') +
      '<div>' + t('powered_by') + ' <span class="footer-brand">Bullish Radar</span></div>';
    return footer;
  }

  /* ── Render Daily Summary ── */
  function renderDailySummary(data) {
    var sec = el('section');
    var card = el('div', 'card daily-summary');

    var picks = data.picks || [];
    var date = data.meta ? data.meta.date : '';
    var picksCount = picks.length;
    var tickers = picks.map(function(p) { return p.ticker; }).join(' & ');
    var topStars = picks.length ? picks[0].stars : 0;
    var topTicker = picks.length ? picks[0].ticker : '';
    var topTemplate = picks.length ? (picks[0].template || '') : '';

    var summaryEn = '';
    var summaryKo = '';

    var scanned = data.meta ? data.meta.total_scanned : '?';
    var regime = data.meta ? (data.meta.market_regime || 'unknown') : 'unknown';
    var regimeEmoji = {bull: '🟢', recovery: '🟡', pullback: '🟠', bear: '🔴', unknown: '⚪'}[regime] || '⚪';
    var regimeLabelEn = {bull: 'Bull market', recovery: 'Recovery', pullback: 'Pullback', bear: 'Bear market', unknown: 'Market'}[regime] || 'Market';
    var regimeLabelKo = {bull: '상승장', recovery: '회복세', pullback: '조정', bear: '하락장', unknown: '시장'}[regime] || '시장';
    var regimeTagEn = ' <span style="background:rgba(255,255,255,0.07);padding:1px 7px;border-radius:10px;font-size:12px;">' + regimeEmoji + ' ' + regimeLabelEn + '</span>';
    var regimeTagKo = ' <span style="background:rgba(255,255,255,0.07);padding:1px 7px;border-radius:10px;font-size:12px;">' + regimeEmoji + ' ' + regimeLabelKo + '</span>';
    if (picksCount === 0) {
        summaryEn = date + regimeTagEn + ' — Scanned ' + scanned + ' tickers. Nothing clears our bar today. Sometimes the best trade is no trade.';
        summaryKo = date + regimeTagKo + ' — ' + scanned + '개 종목 분석 완료. 오늘은 기준 통과 종목 없음. 쉬는 것도 전략입니다.';
    } else if (picksCount === 1) {
        summaryEn = date + regimeTagEn + ' — One pick out of ' + scanned + ': ' + topTicker + ' (' + topStars + '★). ' + topTemplate.replace('Template ', 'T') + '. Tight stops, sir.';
        summaryKo = date + regimeTagKo + ' — ' + scanned + '개 중 1개 추천: ' + topTicker + ' (' + topStars + '★). ' + topTemplate.replace('Template ', 'T') + '. 손절 꼭 지키세요.';
    } else {
        var starsText = picks.map(function(p) { return p.ticker + ' ' + p.stars + '★'; }).join(', ');
        var topSetup = picks[0].template ? picks[0].template.replace('Template ', 'T') : '';
        summaryEn = date + regimeTagEn + ' — ' + picksCount + ' picks from ' + scanned + ' scanned: ' + starsText + '.' + (topSetup ? ' Lead setup: ' + topSetup + '.' : '') + ' Stops in, emotions out.';
        summaryKo = date + regimeTagKo + ' — ' + scanned + '개 중 ' + picksCount + '개 추천: ' + starsText + '.' + (topSetup ? ' 주요 셋업: ' + topSetup + '.' : '') + ' 손절 설정 필수, 감정은 배제.';
    }

    card.innerHTML = '<div style="font-size:15px;line-height:1.6;color:var(--text-2)">' + (lang === 'ko' ? summaryKo : summaryEn) + '</div>';
    sec.appendChild(card);
    return sec;
  }

  /* ── Render Dashboard ── */
  function renderDashboard(data) {
    var app = document.getElementById('app');
    app.innerHTML = '';

    /* Sidebar */
    app.appendChild(renderSidebar(data));

    /* Main */
    var main = el('div', 'main');
    main.appendChild(renderDailySummary(data));
    main.appendChild(renderNews(data.news));
    main.appendChild(renderWatchlist(data.watchlist));
    main.appendChild(renderRadarTable(data.picks));
    main.appendChild(renderHeatmap(data.picks));
    main.appendChild(renderDetailCards(data.picks));
    main.appendChild(renderPerformance(data.performance));
    main.appendChild(renderFooter(data.meta));
    app.appendChild(main);
  }

  /* ── Main ── */
  document.addEventListener('DOMContentLoaded', async function() {
    try {
      var res = await fetch('dashboard.json');
      if (!res.ok) throw new Error('No data');
      cachedData = await res.json();
      renderDashboard(cachedData);
    } catch(e) {
      document.getElementById('app').innerHTML = '<div class="no-data">' + t('no_data') + '</div>';
      document.getElementById('app').style.display = 'block';
    }
  });

})();
</script>

</body>
</html>
